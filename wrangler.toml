name = "semilla-ecommerce"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "."

# D1 — SQLite serverless
# 1. Crea la DB:        wrangler d1 create shop
# 2. Copia el database_id que te devuelva aquí abajo.
# 3. Aplica schema:     npm run db:init
# 4. (Opcional) seed:   npm run db:seed
[[d1_databases]]
binding = "DB"
database_name = "shop"
database_id = "PEGA_AQUI_EL_ID_DEVUELTO_POR_D1_CREATE"

# Variables NO secretas (se pueden commitear).
[vars]
FRONTEND_URL = "https://semilla-ecommerce.pages.dev"

# Los secretos se añaden con CLI, NO van aquí:
#   wrangler pages secret put STRIPE_SECRET_KEY
#   wrangler pages secret put STRIPE_WEBHOOK_SECRET
#   wrangler pages secret put ADMIN_TOKEN
#
# Para desarrollo local, usa .dev.vars (ver .dev.vars.example).
