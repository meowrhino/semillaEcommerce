<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pedidos — Admin</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="admin">
      <h1>Pedidos</h1>
      <p><a href="index.html">← volver</a></p>
      <table id="tabla">
        <thead><tr><th>Fecha</th><th>Email</th><th>Total</th><th>Items</th></tr></thead>
        <tbody></tbody>
      </table>
    </main>

    <script>
      (async () => {
        const token = localStorage.getItem("shop.admin") || "";
        if (!token) return alert("Guarda el token en /admin primero");
        const res = await fetch(`/api/admin/historial?limit=100`, { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) return alert("Error: " + res.status);
        const pedidos = await res.json();
        document.querySelector("#tabla tbody").innerHTML = pedidos
          .map((p) => `
            <tr>
              <td>${new Date(p.createdAt + "Z").toLocaleString()}</td>
              <td>${p.email || "—"}</td>
              <td>${((p.amount_total || 0) / 100).toFixed(2)} €</td>
              <td>${(p.items || []).map((i) => `${i.nombre || i.id}${i.talla ? "·" + i.talla : ""} ×${i.cantidad}`).join(", ")}</td>
            </tr>`)
          .join("");
      })();
    </script>
  </body>
</html>
