<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pedidos — Admin</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="admin">
      <h1>Pedidos</h1>
      <p><a href="index.html">← volver</a></p>
      <table id="tabla">
        <thead><tr><th>Fecha</th><th>Email</th><th>Total</th><th>Items</th><th>Envío</th><th>Estado</th></tr></thead>
        <tbody></tbody>
      </table>
    </main>

    <script>
      const token = localStorage.getItem("shop.admin") || "";
      const ESTADOS = ["pendiente", "enviado", "entregado", "cancelado"];
      // Escapa datos del comprador (nombre/dirección de Stripe) antes de meterlos en innerHTML.
      const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

      const dirTxt = (envio) => {
        if (!envio) return "—";
        const a = envio.direccion || {};
        const partes = [envio.nombre, a.line1, a.line2, [a.postal_code, a.city].filter(Boolean).join(" "), a.state, a.country]
          .filter(Boolean);
        const zona = envio.zona ? `[${envio.zona}] ` : "";
        return zona + (partes.length ? partes.join(", ") : "sin dirección");
      };

      async function load() {
        if (!token) return alert("Guarda el token en /admin primero");
        const res = await fetch(`/api/admin/historial?limit=100`, { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) return alert("Error: " + res.status);
        const pedidos = await res.json();
        const tbody = document.querySelector("#tabla tbody");
        tbody.innerHTML = pedidos
          .map((p) => `
            <tr>
              <td>${new Date(p.createdAt + "Z").toLocaleString()}</td>
              <td>${esc(p.email) || "—"}</td>
              <td>${((p.amount_total || 0) / 100).toFixed(2)} €</td>
              <td>${(p.items || []).map((i) => `${esc(i.nombre || i.id)}${i.talla && i.talla !== "_" ? "·" + esc(i.talla) : ""} ×${Number(i.cantidad) || 0}`).join(", ")}</td>
              <td>${esc(dirTxt(p.envio))}</td>
              <td>
                <select data-pedido="${p.id}">
                  ${ESTADOS.map((e) => `<option value="${e}" ${e === (p.estado || "pendiente") ? "selected" : ""}>${e}</option>`).join("")}
                </select>
              </td>
            </tr>`)
          .join("");

        tbody.querySelectorAll("select[data-pedido]").forEach((sel) => {
          sel.addEventListener("change", async () => {
            const res = await fetch(`/api/admin/pedido-estado`, {
              method: "POST",
              headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
              body: JSON.stringify({ id: sel.dataset.pedido, estado: sel.value }),
            });
            if (!res.ok) alert("Error guardando estado: " + res.status);
          });
        });
      }

      load();
    </script>
  </body>
</html>
